<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing Request Dashboard — AMZ Prep</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #0f1e3c;
      --navy-mid: #1a2f5a;
      --navy-light: #243a6e;
      --accent: #2563eb;
      --accent-light: #3b82f6;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --amber: #d97706;
      --amber-bg: #fef3c7;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --blue: #2563eb;
      --blue-bg: #dbeafe;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --surface: #f8fafc;
      --white: #ffffff;
      --radius: 10px;
      --radius-lg: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      color: var(--text);
      min-height: 100vh;
    }

    /* TOP NAV */
    .nav {
      background: var(--navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .nav-brand .logo-box {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }
    .btn-refresh {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.15); }

    /* MAIN */
    .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 1.75rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .last-updated { font-size: 12px; color: var(--text-light); }

    /* API CONFIG */
    .config-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .config-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .config-card input {
      flex: 1;
      min-width: 200px;
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      outline: none;
      background: var(--surface);
      color: var(--text);
      font-family: 'Courier New', monospace;
    }
    .config-card input:focus { border-color: var(--accent); }
    .btn-load {
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 7px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-load:hover { background: var(--accent-light); }
    .btn-load:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-demo {
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-demo:hover { background: var(--surface); }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
    }
    .stat-card.accent { background: var(--navy); border-color: var(--navy); }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
    .stat-card.accent .stat-label { color: rgba(255,255,255,0.55); }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
    .stat-card.accent .stat-value { color: #fff; }
    .stat-sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }
    .stat-card.accent .stat-sub { color: rgba(255,255,255,0.45); }
    .stat-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 999px; margin-top: 6px; }
    .stat-delta.good { background: var(--green-bg); color: var(--green); }
    .stat-delta.warn { background: var(--amber-bg); color: var(--amber); }
    .stat-delta.bad { background: var(--red-bg); color: var(--red); }

    /* CHARTS ROW */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title span { font-size: 11px; font-weight: 400; color: var(--text-muted); }

    /* BAR CHART */
    .bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-name { font-size: 12px; color: var(--text); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 7px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-num { font-size: 12px; color: var(--text-muted); width: 42px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* DONUT */
    .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .donut-canvas { width: 130px !important; height: 130px !important; }
    .donut-legend { width: 100%; display: flex; flex-direction: column; gap: 7px; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-pct { margin-left: auto; font-weight: 600; font-size: 12px; font-variant-numeric: tabular-nums; }

    /* TABLE */
    .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.5rem; }
    .table-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .table-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .filter-row { display: flex; gap: 6px; }
    .filter-btn { font-size: 11px; padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500; transition: all 0.12s; }
    .filter-btn.active, .filter-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead tr { background: var(--surface); }
    .data-table th { padding: 9px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fafbfc; }
    .client-cell { font-weight: 600; }
    .subject-cell { color: var(--text-muted); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .time-cell { font-variant-numeric: tabular-nums; font-weight: 500; }
    .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
    .pill.on-time { background: var(--green-bg); color: var(--green); }
    .pill.delayed  { background: var(--amber-bg); color: var(--amber); }
    .pill.overdue  { background: var(--red-bg); color: var(--red); }
    .pill.pending  { background: var(--blue-bg); color: var(--blue); }

    /* EMPTY / ERROR */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 13px; }
    .error-banner { background: var(--red-bg); border: 1px solid #fca5a5; border-radius: var(--radius); padding: 10px 16px; font-size: 13px; color: var(--red); margin-bottom: 1.25rem; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="logo-box">A</div>
    AMZ Prep
  </div>
  <div class="nav-right">
    <span class="nav-badge">Pricing Requests</span>
    <button class="btn-refresh" onclick="refresh()">↻ Refresh</button>
  </div>
</nav>

<div class="main">

  <div class="page-header">
    <div>
      <div class="page-title">Pricing Request Tracker</div>
      <div class="page-sub">Response time monitoring for all incoming pricing requests</div>
    </div>
    <div class="last-updated" id="last-updated">—</div>
  </div>

  <div class="config-card">
    <span class="config-label">Anthropic API key</span>
    <input type="password" id="api-key" placeholder="sk-ant-... (paste to load live Gmail data)" />
    <button class="btn-load" onclick="loadLive()">Load live data</button>
    <button class="btn-demo" onclick="loadDemo()">Use demo data</button>
  </div>

  <div id="error-container"></div>
  <div id="dashboard"></div>

</div>

<script>
var DEMO = [
  { client:"Dupray", subject:"Pricing Request - Dupray - DTC/B2B/FBA Enterprise Plus", received:"2026-03-16T10:00:00", replied:"2026-03-16T13:45:00", responseHrs:3.75, status:"on-time" },
  { client:"Treat Planet", subject:"Pricing Request - Treat Planet - FBA (Emplicit referral)", received:"2026-03-16T09:00:00", replied:"2026-03-16T16:23:00", responseHrs:7.38, status:"delayed" },
  { client:"Marcos E-Comm", subject:"Pricing Request - Marcos E-Comm - FBA Prep", received:"2026-03-16T08:30:00", replied:"2026-03-16T15:39:00", responseHrs:7.15, status:"delayed" },
  { client:"Built Bar", subject:"Pricing Request - Built Bar - MSA", received:"2026-03-14T14:00:00", replied:null, responseHrs:null, status:"pending" },
  { client:"Nail Polish Co", subject:"Pricing Request - New Opportunity Nail Polish", received:"2026-03-15T11:00:00", replied:null, responseHrs:null, status:"pending" },
  { client:"Perfume Brand", subject:"Pricing Request - New Opportunity Perfume Brand", received:"2026-03-13T10:00:00", replied:"2026-03-15T09:00:00", responseHrs:47, status:"overdue" },
  { client:"Snuggle Me", subject:"Pricing Request - Selery x Snuggle Me Organics", received:"2026-03-12T09:00:00", replied:"2026-03-12T12:30:00", responseHrs:3.5, status:"on-time" },
  { client:"Black Mountain", subject:"Pricing Request - Black Mountain x Heart and Sole", received:"2026-03-11T14:00:00", replied:"2026-03-11T17:00:00", responseHrs:3.0, status:"on-time" },
  { client:"Further Food", subject:"Pricing Request - Further Food - MSA 2026", received:"2026-03-10T10:00:00", replied:"2026-03-10T13:20:00", responseHrs:3.33, status:"on-time" },
  { client:"CFAB", subject:"Pricing Request - CFAB - SOW and Profitability", received:"2026-03-09T09:00:00", replied:"2026-03-09T16:00:00", responseHrs:7, status:"delayed" },
];

var allData = [];
var activeFilter = 'all';
var donutChart = null;

var STATUS_COLORS = { 'on-time':'#16a34a','delayed':'#d97706','overdue':'#dc2626','pending':'#2563eb' };
var STATUS_LABELS = { 'on-time':'✅ On Time','delayed':'⚠️ Delayed','overdue':'❌ Overdue','pending':'⏳ Pending' };

function loadDemo() {
  document.getElementById('error-container').innerHTML = '';
  allData = DEMO;
  activeFilter = 'all';
  render();
}

async function loadLive() {
  var key = document.getElementById('api-key').value.trim();
  if (!key) {
    document.getElementById('error-container').innerHTML = '<div class="error-banner">Please paste your Anthropic API key, or click "Use demo data" to preview.</div>';
    return;
  }
  document.getElementById('dashboard').innerHTML = '<div class="empty-state">Loading your pricing request emails from Gmail…</div>';
  document.getElementById('error-container').innerHTML = '';
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail' }],
        messages: [{ role: 'user', content: 'Search Gmail for all emails with subject containing "pricing request". For each unique thread return: client name (extract from subject after "Pricing Request - "), full subject, received (ISO datetime of first message), replied (ISO datetime of first reply from abishek@amzprep.com, or null), responseHrs (hours between received and replied rounded to 2 decimals, or null), status ("on-time" if <=4h, "delayed" if 4-24h, "overdue" if >24h, "pending" if no reply). Return ONLY a raw JSON array, no markdown, no backticks. Limit 40 most recent.' }]
      })
    });
    var d = await res.json();
    var text = (d.content||[]).filter(function(b){ return b.type==='text'; }).map(function(b){ return b.text; }).join('');
    allData = JSON.parse(text.replace(/```json|```/g,'').trim());
    activeFilter = 'all';
    render();
  } catch(e) {
    document.getElementById('error-container').innerHTML = '<div class="error-banner">Could not load live data: ' + e.message + '</div>';
    document.getElementById('dashboard').innerHTML = '';
  }
}

function refresh() {
  var key = document.getElementById('api-key').value.trim();
  if (key) loadLive(); else loadDemo();
}

function setFilter(f) {
  activeFilter = f;
  renderTable();
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === f);
  });
}

function render() {
  var replied = allData.filter(function(d){ return d.responseHrs !== null; });
  var onTime  = allData.filter(function(d){ return d.status === 'on-time'; }).length;
  var delayed = allData.filter(function(d){ return d.status === 'delayed'; }).length;
  var overdue = allData.filter(function(d){ return d.status === 'overdue'; }).length;
  var pending = allData.filter(function(d){ return d.status === 'pending'; }).length;
  var avgHrs  = replied.length ? Math.round(replied.reduce(function(s,d){ return s+d.responseHrs; },0)/replied.length*10)/10 : 0;
  var slaRate = replied.length ? Math.round(onTime/replied.length*100) : 0;
  var slaDelta = slaRate >= 80 ? 'good' : slaRate >= 50 ? 'warn' : 'bad';

  var barData = replied.slice().sort(function(a,b){ return b.responseHrs-a.responseHrs; }).slice(0,7);
  var maxH = barData.length ? barData[0].responseHrs : 1;

  var bars = barData.map(function(d) {
    var pct = Math.round(d.responseHrs/maxH*100);
    var col = STATUS_COLORS[d.status];
    return '<div class="bar-item">' +
      '<div class="bar-name" title="'+d.client+'">'+d.client+'</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+';"></div></div>' +
      '<div class="bar-num">'+d.responseHrs+'h</div>' +
    '</div>';
  }).join('');

  var total = allData.length || 1;
  var legend = [
    { label:'On time', count:onTime, status:'on-time' },
    { label:'Delayed', count:delayed, status:'delayed' },
    { label:'Overdue', count:overdue, status:'overdue' },
    { label:'Pending', count:pending, status:'pending' },
  ].map(function(l) {
    return '<div class="legend-row"><div class="legend-dot" style="background:'+STATUS_COLORS[l.status]+'"></div>'+l.label+'<span class="legend-pct">'+l.count+'</span></div>';
  }).join('');

  document.getElementById('dashboard').innerHTML =
    '<div class="stats-grid">' +
      statCard(true, 'Total requests', allData.length, 'all time', null) +
      statCard(false, 'Avg response time', avgHrs+'h', 'for replied emails', null) +
      statCard(false, 'SLA rate (≤4h)', slaRate+'%', 'replied within target', slaDelta) +
      statCard(false, 'Pending', pending, 'awaiting reply', pending > 0 ? 'warn' : 'good') +
    '</div>' +

    '<div class="charts-row">' +
      '<div class="card">' +
        '<div class="card-title">Response time by client <span>slowest first</span></div>' +
        (bars || '<div class="empty-state">No replied emails yet</div>') +
      '</div>' +
      '<div class="card">' +
        '<div class="card-title">Status breakdown</div>' +
        '<div class="donut-wrap">' +
          '<canvas class="donut-canvas" id="donut-chart"></canvas>' +
          '<div class="donut-legend">'+legend+'</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="table-card">' +
      '<div class="table-header">' +
        '<div class="table-title">All pricing requests</div>' +
        '<div class="filter-row">' +
          filterBtn('all', 'All ('+allData.length+')') +
          filterBtn('on-time', 'On time ('+onTime+')') +
          filterBtn('delayed', 'Delayed ('+delayed+')') +
          filterBtn('overdue', 'Overdue ('+overdue+')') +
          filterBtn('pending', 'Pending ('+pending+')') +
        '</div>' +
      '</div>' +
      '<div id="table-body"></div>' +
    '</div>';

  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  renderTable();
  drawDonut(onTime, delayed, overdue, pending);
}

function statCard(accent, label, value, sub, delta) {
  var deltaHtml = delta ? '<div class="stat-delta '+delta+'">'+(delta==='good'?'↑ good':delta==='warn'?'⚠ watch':'↓ low')+'</div>' : '';
  return '<div class="stat-card'+(accent?' accent':'')+'">'+
    '<div class="stat-label">'+label+'</div>'+
    '<div class="stat-value">'+value+'</div>'+
    '<div class="stat-sub">'+sub+'</div>'+
    deltaHtml+
  '</div>';
}

function filterBtn(f, label) {
  return '<button class="filter-btn'+(activeFilter===f?' active':'')+'" data-filter="'+f+'" onclick="setFilter(\''+f+'\')">'+label+'</button>';
}

function renderTable() {
  var filtered = activeFilter === 'all' ? allData : allData.filter(function(d){ return d.status === activeFilter; });
  var sorted = filtered.slice().sort(function(a,b){ return new Date(b.received)-new Date(a.received); });
  if (!sorted.length) {
    document.getElementById('table-body').innerHTML = '<div class="empty-state">No emails match this filter</div>';
    return;
  }
  var rows = sorted.map(function(d) {
    var recv = new Date(d.received).toLocaleDateString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    var hrs = d.responseHrs !== null ? d.responseHrs+'h' : '—';
    return '<tr>'+
      '<td class="client-cell">'+d.client+'</td>'+
      '<td class="subject-cell" title="'+d.subject+'">'+d.subject.replace(/^re:\s*/i,'')+'</td>'+
      '<td style="white-space:nowrap;color:#64748b;font-size:12px;">'+recv+'</td>'+
      '<td class="time-cell">'+hrs+'</td>'+
      '<td><span class="pill '+d.status+'">'+STATUS_LABELS[d.status]+'</span></td>'+
    '</tr>';
  }).join('');
  document.getElementById('table-body').innerHTML =
    '<table class="data-table">'+
      '<thead><tr><th>Client</th><th>Subject</th><th>Received</th><th>Response time</th><th>Status</th></tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>';
}

function drawDonut(onTime, delayed, overdue, pending) {
  setTimeout(function() {
    var ctx = document.getElementById('donut-chart');
    if (!ctx) return;
    if (donutChart) { donutChart.destroy(); donutChart = null; }
    donutChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [onTime, delayed, overdue, pending],
          backgroundColor: ['#16a34a','#d97706','#dc2626','#2563eb'],
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        cutout: '68%',
        plugins: { legend: { display: false }, tooltip: { enabled: true } },
        animation: { duration: 700, easing: 'easeInOutQuart' }
      }
    });
  }, 50);
}

// Auto-load demo on start
loadDemo();
</script>
</body>
</html>
